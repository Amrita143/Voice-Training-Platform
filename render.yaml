# Render blueprint for the xAI proxy (the only backend). On every push, Render
# rebuilds + redeploys server/. Create it once: Render Dashboard → New → Blueprint
# → pick this repo. Then set the XAI_API_KEY value in the Render dashboard.
#
# Render injects PORT automatically (the proxy reads process.env.PORT).
services:
  - type: web
    name: avtp-xai-proxy
    runtime: node
    plan: free          # free tier sleeps after ~15 min idle (cold start ~30-60s)
    rootDir: server
    buildCommand: npm install
    startCommand: node index.mjs
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: GCLOUD_PROJECT
        value: astra-voice-training
      - key: XAI_API_KEY
        sync: false       # set this secret in the Render dashboard (never in git)
