name: Deploy

# Auto-deploy the web app + Firestore rules on every push to main.
# (The xAI proxy in server/ deploys separately via Render — see DEPLOY.md.)
on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  firebase:
    name: Web + Firestore rules → Firebase
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build shared package + web app
        run: |
          npm run build:shared
          npm run build:web

      - name: Deploy to Firebase (hosting + firestore rules)
        run: |
          # Prefer a service account (recommended; login:ci tokens are deprecated).
          # Falls back to FIREBASE_TOKEN only if no service account is provided.
          if [ -n "$FIREBASE_SERVICE_ACCOUNT" ]; then
            printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "$RUNNER_TEMP/sa.json"
            export GOOGLE_APPLICATION_CREDENTIALS="$RUNNER_TEMP/sa.json"
            echo "Authenticating with service account."
          elif [ -n "$FIREBASE_TOKEN" ]; then
            echo "Authenticating with FIREBASE_TOKEN (deprecated)."
          else
            echo "::error::Set repo secret FIREBASE_SERVICE_ACCOUNT (recommended) or FIREBASE_TOKEN."
            exit 1
          fi
          npx --yes firebase-tools@latest deploy \
            --only hosting,firestore:rules \
            --project astra-voice-training \
            --non-interactive
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
