name: Deploy

# Auto-deploy the web app + Firestore rules on every push to main.
# (The xAI proxy in server/ deploys separately via Render — see DEPLOY.md.)
on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  firebase:
    name: Web + Firestore rules → Firebase
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build shared package + web app
        run: |
          npm run build:shared
          npm run build:web

      - name: Deploy to Firebase (hosting + firestore rules)
        run: |
          # Auth via EITHER a CI token (FIREBASE_TOKEN, simplest) OR a service
          # account JSON (FIREBASE_SERVICE_ACCOUNT). Set one of them as a repo secret.
          if [ -n "$FIREBASE_TOKEN" ]; then
            echo "Using FIREBASE_TOKEN"
          elif [ -n "$FIREBASE_SERVICE_ACCOUNT" ]; then
            printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "$RUNNER_TEMP/sa.json"
            export GOOGLE_APPLICATION_CREDENTIALS="$RUNNER_TEMP/sa.json"
          else
            echo "::error::Set a repo secret: FIREBASE_TOKEN (from 'firebase login:ci') or FIREBASE_SERVICE_ACCOUNT (SA JSON)."
            exit 1
          fi
          npx --yes firebase-tools@latest deploy \
            --only hosting,firestore:rules \
            --project astra-voice-training \
            --non-interactive
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
